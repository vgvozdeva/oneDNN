name: "oneDNN Bazel Build Compliance"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/tensorflow-integration-smoke.yml"
      - "CMakeLists.txt"
      - "include/oneapi/dnnl/dnnl_config.h.in"
      - "include/oneapi/dnnl/dnnl_version.h.in"
      - "include/oneapi/dnnl/dnnl_version_hash.h.in"
      - "scripts/generate_bazel_dnnl_substitutions.py"
      - "bazel/**"
      - "src/common/**"
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  bazel-build-compliance:
    name: Build oneDNN common sources with Bazel
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout oneDNN
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Bazelisk
        run: |
          set -eux
          BAZELISK_VERSION=v1.26.0
          curl -fsSL -o bazelisk \
            "https://github.com/bazelbuild/bazelisk/releases/download/${BAZELISK_VERSION}/bazelisk-linux-amd64"
          chmod +x bazelisk
          sudo mv bazelisk /usr/local/bin/bazel
          bazel --version

      - name: Regenerate oneDNN Bazel substitutions
        run: |
          set -eux
          python3 ./scripts/generate_bazel_dnnl_substitutions.py
          git diff --exit-code -- bazel/dnnl_config_substitutions.bzl

      - name: Create temporary Bazel workspace files
        run: |
          set -eux
          cat > MODULE.bazel << 'EOF'
          bazel_dep(name = "bazel_skylib", version = "1.8.2")
          EOF

          cat > BUILD.bazel << 'EOF'
          load("@bazel_skylib//rules:expand_template.bzl", "expand_template")
          load("//:bazel/dnnl_config_substitutions.bzl",
             "DNNL_CONFIG_SUBSTITUTIONS_OMP",
             "DNNL_VERSION_HASH_SUBSTITUTIONS",
             "DNNL_VERSION_SUBSTITUTIONS")

          expand_template(
            name = "dnnl_config_h",
            out = "include/oneapi/dnnl/dnnl_config.h",
            substitutions = DNNL_CONFIG_SUBSTITUTIONS_OMP,
            template = "include/oneapi/dnnl/dnnl_config.h.in",
          )

          expand_template(
            name = "dnnl_version_h",
            out = "include/oneapi/dnnl/dnnl_version.h",
            substitutions = DNNL_VERSION_SUBSTITUTIONS,
            template = "include/oneapi/dnnl/dnnl_version.h.in",
          )

          expand_template(
            name = "dnnl_version_hash_h",
            out = "include/oneapi/dnnl/dnnl_version_hash.h",
            substitutions = DNNL_VERSION_HASH_SUBSTITUTIONS,
            template = "include/oneapi/dnnl/dnnl_version_hash.h.in",
          )

          cc_library(
            name = "onednn_compile_smoke",
            srcs = [
              "src/common/dnnl_debug.cpp",
              "src/common/dnnl_debug_autogenerated.cpp",
            ],
            hdrs = [
              ":dnnl_config_h",
              ":dnnl_version_h",
              ":dnnl_version_hash_h",
            ] + glob([
              "include/**/*.h",
              "src/common/**/*.h",
              "src/common/**/*.hpp",
            ]),
            copts = ["-std=c++11"],
            includes = ["include", "src"],
            visibility = ["//visibility:public"],
          )
          EOF

      - name: Build oneDNN Bazel compile smoke target
        run: |
          set -eux
          bazel build \
            --verbose_failures \
            //:onednn_compile_smoke
